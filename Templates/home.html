<!DOCTYPE html>
<html>
<head>
    <title>Home - Recipe4U</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .home-container {
            max-width: 800px;
            margin: auto;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
        }

        .search-bar {
            margin-top: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #aaa;
            border-radius: 10px;
        }

        .recipes {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .recipe-card {
            background-color: #fff8f0;
            padding: 15px;
            border-radius: 12px;
            width: 45%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .recipe-card h4 {
            margin-top: 0;
        }

        .logout-btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            float: right;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <a href="/logout" class="logout-btn">Logout</a>
        <h2>~Welcome To Recipe4U~</h2>
        <p>Ready to explore delicious recipes today?</p>

        
        <div class="search-bar">
            <form action="#" method="GET">
                <input type="text" name="search" placeholder="Search recipes by name, ingredients, etc. 🔍">
            </form>
        </div>

        
        <h3>Featured Recipes</h3>
        <div class="recipes">
            <div class="recipe-card">
                <h4> Spaghetti Bolognese</h4>
                <p>A classic Italian pasta dish made with rich tomato and meat sauce.</p>
            </div>
            <div class="recipe-card">
                <h4> Fresh Avocado Salad</h4>
                <p>Healthy and refreshing, made with avocado, cucumber, and lime.</p>
            </div>
        </div>
    </div>
</body>
</html>
